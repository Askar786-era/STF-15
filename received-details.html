<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Handover Details - Stranger to Friends</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <style>
        :root {
            --primary: #cc0000;
            --primary-hover: #b30000;
            --bg: #f5f7f8;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-muted: #666666;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            width: 100%;
        }

        .back-btn {
            background: #ffffff;
            color: var(--text-dark);
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: var(--transition);
        }

        .back-btn:hover {
            background: #eee;
            transform: translateY(-2px);
        }

        .details-card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.03);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark);
        }

        .form-group input {
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid #ddd;
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(204, 0, 0, 0.1);
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bar">
            <a href="receiver-dashboard.html" class="back-btn">← Dashboard</a>
            <a href="STF.html" class="back-btn">Home</a>
        </div>

        <div class="details-card">
            <h2>🩸 Donation Handover Details</h2>
            <p class="subtitle">Please provide the details of the donor who gave the blood and your requested units.</p>

            <form id="handoverForm">
                <!-- Donor Details Section -->
                <div class="form-group">
                    <label for="donorName">👤 Donor Name</label>
                    <input type="text" id="donorName" placeholder="Enter donor's full name" required>
                </div>

                <div class="form-group">
                    <label for="donorPhone">📱 Donor Phone Number</label>
                    <input type="tel" id="donorPhone" placeholder="Enter 10-digit phone number" required pattern="[0-9]{10}">
                </div>

                <div class="form-group">
                    <label for="donorEmail">✉️ Donor Email Address</label>
                    <input type="email" id="donorEmail" placeholder="Enter donor's email address" required>
                </div>

                <!-- Units Section -->
                <div class="form-group">
                    <label for="unitsRequired">💉 Blood Units Required / Received</label>
                    <input type="number" id="unitsRequired" placeholder="Number of units required (e.g. 2)" min="1" required>
                </div>

                <button type="submit" class="submit-btn">Submit & Complete Request →</button>
            </form>
        </div>
    </div>

    <script>
        const BASE_URL = (window.location.origin.startsWith('http') ? window.location.origin : 'http://localhost:5000') + '/api';

        document.getElementById('handoverForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get Request ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const requestId = urlParams.get('id');

            if (!requestId) {
                alert('Invalid Request ID. Please return to the dashboard.');
                return;
            }

            const data = {
                donorName: document.getElementById('donorName').value.trim(),
                donorPhone: document.getElementById('donorPhone').value.trim(),
                donorEmail: document.getElementById('donorEmail').value.trim(),
                unitsRequired: parseInt(document.getElementById('unitsRequired').value.trim(), 10)
            };

            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Processing...';

            try {
                const response = await fetch(`${BASE_URL}/blood-requests/${requestId}/fulfill`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (response.ok && result.success) {
                    alert('Blood request fulfilled and removed successfully!');
                    window.location.href = 'receiver-dashboard.html';
                } else {
                    alert('Error: ' + (result.error || 'Failed to complete request'));
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit & Complete Request →';
                }
            } catch (err) {
                alert('Network error. Failed to fulfill the request.');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit & Complete Request →';
            }
        });
    </script>
</body>
</html>
